version: "3.9"

# ── Canopy 生产环境 Docker Compose ──
# 部署: docker compose -f deploy/docker-compose.prod.yml up -d

services:
  canopy-server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: canopy-server
    restart: unless-stopped
    ports:
      - "${CANOPY_PORT:-8080}:8080"
    environment:
      - CANOPY_MODE=production
      - CANOPY_SANDBOX=${CANOPY_SANDBOX:-true}
      # 交易所 API
      - BINANCE_API_KEY=${BINANCE_API_KEY:-}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET:-}
      - OKX_API_KEY=${OKX_API_KEY:-}
      - OKX_API_SECRET=${OKX_API_SECRET:-}
      - BYBIT_API_KEY=${BYBIT_API_KEY:-}
      - BYBIT_API_SECRET=${BYBIT_API_SECRET:-}
      # 告警渠道
      - FEISHU_WEBHOOK_URL=${FEISHU_WEBHOOK_URL:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - WECHAT_SCKEY=${WECHAT_SCKEY:-}
    volumes:
      - canopy_data:/app/data
      - canopy_cache:/app/data/cache
      - canopy_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/kpi"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - canopy-net
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M

  canopy-runner:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: canopy-runner
    restart: unless-stopped
    command: python -m canopy.engine.runner --mode multi --exchanges binance okx bybit --strategies trend:trend grid:grid arbitrage:arbitrage
    environment:
      - CANOPY_MODE=production
      - CANOPY_SANDBOX=${CANOPY_SANDBOX:-true}
      - BINANCE_API_KEY=${BINANCE_API_KEY:-}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET:-}
      - OKX_API_KEY=${OKX_API_KEY:-}
      - OKX_API_SECRET=${OKX_API_SECRET:-}
      - BYBIT_API_KEY=${BYBIT_API_KEY:-}
      - BYBIT_API_SECRET=${BYBIT_API_SECRET:-}
      - FEISHU_WEBHOOK_URL=${FEISHU_WEBHOOK_URL:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - WECHAT_SCKEY=${WECHAT_SCKEY:-}
    volumes:
      - canopy_data:/app/data
      - canopy_cache:/app/data/cache
      - canopy_logs:/app/logs
    depends_on:
      canopy-server:
        condition: service_healthy
    networks:
      - canopy-net
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 512M

  nginx:
    image: nginx:alpine
    container_name: canopy-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - canopy_static:/app/web/static:ro
    depends_on:
      - canopy-server
    networks:
      - canopy-net

volumes:
  canopy_data:
  canopy_cache:
  canopy_logs:
  canopy_static:

networks:
  canopy-net:
    driver: bridge
