# Canopy Nginx Reverse Proxy
# 反向代理 Prometheus metrics（localhost:9090）和预留 Web Dashboard（localhost:8080）
#
# 用法:
#   macOS: 复制到 /opt/homebrew/etc/nginx/servers/canopy.conf，然后 brew services reload nginx
#   Linux: 复制到 /etc/nginx/sites-available/canopy，然后 ln -s /etc/nginx/sites-enabled/canopy

upstream prometheus_backend {
    server 127.0.0.1:9090;
    keepalive 32;
}

upstream dashboard_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

# ── 限流区域定义 ──
limit_req_zone $binary_remote_addr zone=prometheus_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=dashboard_limit:10m rate=60r/m;

server {
    listen 8081;
    server_name localhost;

    # ── Gzip 压缩 ──
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        image/svg+xml;

    # ── Prometheus Metrics 代理 ──
    location /metrics {
        limit_req zone=prometheus_limit burst=5 nodelay;
        proxy_pass http://prometheus_backend/metrics;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
    }

    # ── Web Dashboard 代理 ──
    location / {
        limit_req zone=dashboard_limit burst=10 nodelay;
        proxy_pass http://dashboard_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── 健康检查 ──
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ── 安全头部 ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
