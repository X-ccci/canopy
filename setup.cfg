[ruff]
line-length = 100
exclude = .git,__pycache__,.pytest_cache,build,dist,venv,.venv

[ruff.lint]
select = E,F,I,N,W,UP
ignore = E501

[ruff.lint.isort]
known-first-party = canopy

[mypy]
python_version = 3.10
warn_return_any = True
warn_unused_configs = True
ignore_missing_imports = True
disallow_untyped_defs = False

[mypy-ccxt.*]
ignore_missing_imports = True

[mypy-pywebview.*]
ignore_missing_imports = True

[mypy-webview.*]
ignore_missing_imports = True
